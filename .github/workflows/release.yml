name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: statically linked against musl so the binary runs on any
          # glibc version (Debian 11's 2.31, Alpine, etc.) without a system
          # dependency. This is the standard approach for portable Rust CLI
          # release binaries.
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            artifact: hushwire-x86_64-linux
            use-cross: false
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            artifact: hushwire-aarch64-linux
            use-cross: true
          # macOS: native build on an Apple Silicon runner.
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: hushwire-aarch64-macos
            use-cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools (native Linux musl)
        if: runner.os == 'Linux' && !matrix.use-cross
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build (native musl)
        if: runner.os == 'Linux' && !matrix.use-cross
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross for ARM64 musl)
        if: matrix.use-cross
        run: |
          cargo install cross
          cross build --release --target ${{ matrix.target }}

      - name: Build (macOS native)
        if: runner.os == 'macOS'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }}.tar.gz hushwire
          cd ../../..
          if command -v shasum >/dev/null; then
            shasum -a 256 ${{ matrix.artifact }}.tar.gz
          else
            sha256sum ${{ matrix.artifact }}.tar.gz
          fi > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256

  release:
    name: Publish to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Build release body (notes + auto changelog)
        id: body
        run: |
          {
            cat .github/RELEASE_NOTES.md
            echo ""
            echo "---"
            echo ""
          } > /tmp/release-body.md

          # Fetch the auto-generated changelog from GitHub and append it.
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)
          if [ -n "$PREV_TAG" ]; then
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ github.ref_name }}" >> /tmp/release-body.md
          fi

          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/release-body.md >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body: ${{ steps.body.outputs.body }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
